<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1000" role="img" aria-label="OC5 Open Context Vault logo">
  <title>OC5 — Open Context Vault</title>

  <!-- safe body -->
  <rect x="40" y="30" width="740" height="900" rx="110" fill="#9e97dd"/>
  <rect x="150" y="905" width="95" height="65" rx="24" fill="#9e97dd"/>
  <rect x="575" y="905" width="95" height="65" rx="24" fill="#9e97dd"/>

  <!-- vault door -->
  <rect x="150" y="140" width="520" height="740" rx="46" fill="#f6c19a"/>
  <line x1="178" y1="185" x2="178" y2="835" stroke="#8f7fc4" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

  <!-- magnifier / keyhole mark -->
  <g fill="none" stroke="#6a63b5">
    <circle cx="410" cy="395" r="122" stroke-width="34"/>
    <circle cx="410" cy="395" r="86" stroke-width="24"/>
  </g>
  <rect x="524" y="378" width="100" height="34" rx="17" fill="#6a63b5"/>
  <circle cx="410" cy="395" r="56" fill="#6a63b5"/>
  <circle cx="410" cy="382" r="15" fill="#f6c19a"/>
  <path d="M 398 393 L 422 393 L 414 424 L 406 424 Z" fill="#f6c19a"/>

  <!-- wordmark -->
  <text x="410" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="150" fill="#6a63b5">OC5</text>
  <text x="410" y="795" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="46" letter-spacing="6" fill="#6a63b5">OPEN CONTEXT</text>
  <text x="410" y="850" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="46" letter-spacing="12" fill="#6a63b5">VAULT</text>
</svg>
