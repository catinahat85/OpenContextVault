<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="260" height="320" role="img" aria-label="OC5 Open Context Vault">
  <defs>
    <style>
      .frame { fill: #9c99e1; }
      .body  { fill: #f7b593; }
      .ink   { fill: none; stroke: #6961a3; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
      .inkf  { fill: #6961a3; }
    </style>
  </defs>

  <!-- outer safe frame -->
  <rect x="10" y="10" width="240" height="300" rx="26" class="frame"/>
  <!-- feet -->
  <rect x="34" y="304" width="26" height="16" rx="5" class="frame"/>
  <rect x="200" y="304" width="26" height="16" rx="5" class="frame"/>

  <!-- inner door/body -->
  <rect x="40" y="40" width="180" height="240" rx="16" class="body"/>
  <!-- hinge line -->
  <line x1="46" y1="52" x2="46" y2="268" stroke="#6961a3" stroke-width="4" opacity="0.35"/>

  <!-- dial: concentric rings + keyhole + handle spoke -->
  <circle cx="130" cy="120" r="34" class="ink"/>
  <circle cx="130" cy="120" r="20" class="ink"/>
  <!-- keyhole -->
  <circle cx="130" cy="114" r="7" class="inkf"/>
  <path d="M126 118 L124 132 L136 132 L134 118 Z" class="inkf"/>
  <!-- handle spoke to the right -->
  <line x1="164" y1="120" x2="196" y2="120" class="ink"/>

  <!-- wordmark -->
  <text x="130" y="228" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="72" fill="#6961a3" letter-spacing="2">OC5</text>
  <text x="130" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="15" fill="#6961a3" letter-spacing="1.5">OPEN CONTEXT</text>
  <text x="130" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="15" fill="#6961a3" letter-spacing="4">VAULT</text>
</svg>
